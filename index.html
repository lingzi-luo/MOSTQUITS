<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOSTQUITS Progress Report</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #222;
      background: #fff;
    }

    main {
      max-width: 860px;
      margin: 6vh auto;
      padding: 0 24px;
      line-height: 1.5;
      text-align: center;
    }

    .logo-frame {
      width: min(100%, 820px);
      margin: 0 auto 28px;
      padding: clamp(18px, 5vw, 52px);
      box-sizing: border-box;
      background: #64009a;
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 32px;
    }

    p {
      margin-top: 0;
      color: #555;
    }

    .note {
      max-width: 640px;
      margin: 34px auto 0;
      padding-top: 22px;
      border-top: 1px solid #ddd;
      color: #555;
      font-size: 15px;
    }

    .note strong {
      color: #222;
    }

    ul {
      margin-top: 28px;
      padding-left: 0;
      list-style: none;
    }

    li {
      margin: 14px 0;
    }

    a {
      display: inline-block;
      min-width: 260px;
      padding: 12px 18px;
      color: #fff;
      background: #57068c;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 650;
      text-decoration: none;
    }

    a:hover {
      background: #3f0467;
    }
  </style>
</head>
